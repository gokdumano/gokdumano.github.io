<!DOCTYPE html>
<html lang='tr'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <link rel='stylesheet' href='styles.css' />
    <link
      href='https://cdn.jsdelivr.net/npm/ol@10.4.0/ol.min.css'
      rel='stylesheet'
    />
    <title>Metro Istanbul</title>
    <script src='https://cdn.jsdelivr.net/npm/ol@10.4.0/dist/ol.min.js'></script>
    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>
    <script src='script.js'></script>
  </head>

  <body>
    <div id='container'>
      <div id='left-panel'>
        <div id='metro-istanbul-logo-container'>
          <img
            src='https://www.metro.istanbul/Content/assets/uploaded/9474ccf6-0c21-44fc-8901-f0780eff5e7f.png'
            id='metro-istanbul-logo'
            alt='Metro Istanbul Logo'
          />
        </div>
        <div id='metro-istanbul-lines-container'>
          <select id='metro-istanbul-lines'>
            <!-- GetLines() -->
          </select>
        </div>
        <div id='metro-istanbul-line-stops-container'>
        </div>
        <div id='ticket-prices-table-container'>
          <table id='ticket-prices-table'>
          </table>
        </div>
      </div>
      <div id='right-panel'>
        <div id='map-container'>
          <!-- OSM Haritası buraya eklenecek -->
          <script>
            // OpenLayers kullanarak harita oluşturma
            const map = new ol.Map({
              target: 'map-container',
              layers: [
                // OpenStreetMap katmanı
                new ol.layer.Tile({
                  source: new ol.source.OSM(),
                }),
              ],
              view: new ol.View({
                center: ol.proj.fromLonLat([34.0, 38.0]), // Türkiye'nin merkez konumu
                zoom: 6,
              }),
            });
          </script>
        </div>
        <div id='announcement-marquee-container'>
          <!-- Duyurular buraya dinamik olarak eklenecek -->
          <marquee id='announcement-marquee'>Duyurular burada gösterilecek...</marquee>
        </div>
      </div>
    </div>
    <div id='myModal' class='modal'>
      <div class='modal-content'>
        <span class='close'>&times;</span>
        <p id='modal-content'></p>
      </div>
    </div>
  </body>
</html>
