<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstanbul Metro Ağı</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">
</head>
<body>
    <div class="container">
        <!-- Sol Bölüm -->
        <div class="left-panel" id="leftPanel">
            <!-- Metro İstanbul Logosu -->
            <img src="imgs/metro-istanbul-logo.png" alt="Metro İstanbul Logo" class="metro-istanbul-logo" id="metroLogo">
            <div class="hat-list">
                <h2>Hat Kodu</h2>
                <select id="hatSecimi">
                    <!-- Hatlar buraya dinamik olarak eklenecek -->
                </select>
            </div>
            <div class="calisma-saatleri">
                <h4>Çalışma Saatleri</h4>
                <div id="calismaSaatleri">
                    <!-- Çalışma saatleri buraya dinamik olarak eklenecek -->
                </div>
            </div>
            <div class="durak-listesi">
                <h3>Duraklar</h3>
                <ul id="durakListesi">
                    <!-- Duraklar buraya dinamik olarak eklenecek -->
                </ul>
            </div>
            <div class="bilet-fiyatlari">
                <h4>Bilet Fiyatları</h4>
                <div id="biletFiyatlari">
                    <!-- Bilet fiyatları buraya dinamik olarak eklenecek -->
                </div>
            </div>
        </div>

        <!-- Sağ Bölüm (Harita) -->
        <div class="right-panel">
            <div id="map" class="map"></div>
                <!-- Harita buraya dinamik olarak eklenecek -->
        </div>
    </div>

    <!-- Duyuru Şeridi -->
    <div class="duyuru-seridi">
        <marquee id="duyuruMarquee">Duyurular burada gösterilecek...</marquee>
            <!-- Duyurular buraya dinamik olarak eklenecek -->
    </div>

    <!-- Child Page (Popup) -->
    <div class="child-page-popup" id="childPagePopup">
        <div class="popup-content">
            <h1 id="popupTitle">Metro İstanbul Hakkında</h1>
            <div class="document-content" id="popupContent">
                <!-- İçerik buraya dinamik olarak eklenecek -->
            </div>
            <button class="close-button" id="closePopupButton">Kapat</button>
        </div>
    </div>

    <!-- OpenLayers CDN ve Script -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    <script src="script.js"></script>
</body>
</html>
