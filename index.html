<!DOCTYPE html>
<html>
<head>
  <title>jQuery Proxy İsteği</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <button id="sendRequest">İstek Gönder</button>
  <div id="result" style="margin-top:20px;padding:10px;border:1px solid #ddd;"></div>
  <div id="error" style="color:red;margin-top:10px;"></div>

  <script>
    $(document).ready(function() {
      $('#sendRequest').click(function() {
        const proxyUrl = 'https://cors-proxy-repo.onrender.com'
        const apiUrl = 'https://halfiyatlaripublicdata.ibb.gov.tr/api/HalManager/getProductPricebyDay'

        $.ajax({
          url: `${proxyUrl}/post?url=${encodeURIComponent(apiUrl)}`,
          method: 'POST',
          data: JSON.stringify({
            item: {
              Day: "2025-03-26"
            }
          }),
          headers: {
			'Content-Type': 'application/json',
			'Accept': 'application/json'
          },
          success: function(response) {
            $('#result').html('<pre>' + JSON.stringify(response, null, 2) + '</pre>');
          },
          error: function(xhr) {
            $('#error').html('Hata: ' + xhr.status + ' - ' + xhr.responseText);
          }
        });
      });
    });
  </script>
</body>
</html>
