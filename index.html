  <meta charset="utf-8" />

  <title>Fetch  JSON from API and map lat lon</title>
</head>


<body>
<div>
      <h1>ISS Tracker</h1>
<!-- our Map goes here -->
      <div id="map">
</div>
<!-- Details about ISS -->
      <div id="details">
        <!-- Time -->
        <div>
          Time:
          <span class="time"></span>
        </div>
        <!-- Latitude -->
        <div>
          Latitude:
          <span class="latitude"></span>
        </div>
        <!-- Longitude -->
        <div>
          Longitude:
          <span class="longitude"></span>
        </div>
        <!-- Speed -->
        <div>
          Speed:
          <span class="speed"></span>
        </div>
        <!-- Altitude -->
        <div>
          Altitude:
          <span class="altitude"></span>
        </div>
        <!-- Visibility -->
        <div>
          Visibility:
          <span class="visibility"></span>
        </div>
      </div>
    </div>
