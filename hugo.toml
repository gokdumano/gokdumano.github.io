[languages]
  [languages.en]
    languageName = "English"
    title = "The DBA's Guide to the Galaxy"
    [languages.en.params]
      subtitle = "A simple, retro theme for Hugo"
      owner = ""
      keywords = ""
      copyright = ""
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      newerPosts = "Newer posts"
      olderPosts = "Older posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"

      [languages.en.params.logo]
        logoText = "@gokdumano"

      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/about"
          weight = 1
        [[languages.en.menu.main]]
          identifier = "showcase"
          name = "Showcase"
          url = "/posts/showcase"
          weight = 3
        [[languages.en.menu.main]]
          identifier = "richcontent"
          name = "Rich Content"
          url = "/posts/rich-content"
          weight = 4