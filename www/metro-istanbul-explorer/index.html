<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citybus Limited - Route Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map { 
            height: 100%;
            width: 100%;
        }

        .route-line {
            position: relative;
            padding-left: 2rem;
        }
        .direction-item {
            transition: all 0.2s ease;
        }
        .direction-item:hover {
            background-color: #f8fafc;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .leaflet-control-layers {
            border-radius: 8px !important;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important;
        }
        
        .leaflet-control-layers-toggle {
            background-size: 26px 26px !important;
        }
        
        .leaflet-bar {
            border-radius: 8px !important;
        }
        
        .leaflet-control-zoom-in, 
        .leaflet-control-zoom-out {
            border-radius: 8px 8px 0 0 !important;
        }
        
        .leaflet-control-zoom-out {
            border-radius: 0 0 8px 8px !important;
        }
        
        .station-popup .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            padding: 0 !important;
            overflow: hidden;
        }
        
        .station-popup .leaflet-popup-content {
            margin: 0 !important;
            width: 280px !important;
        }
        
        .station-popup .leaflet-popup-tip-container {
            margin-top: -1px !important;
        }
        
        .feature-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
        }
        
        .feature-row {
            transition: background-color 0.2s;
        }
        
        .feature-row:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Left Panel (20%) -->
        <div class="w-1/5 bg-white shadow-lg flex flex-col border-r border-gray-200">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center mb-1">
                    <img style="width:100%;" src="https://www.metro.istanbul/Content/assets/uploaded/9474ccf6-0c21-44fc-8901-f0780eff5e7f.png">
                </div>
            </div>
            
            <!-- Route Selection -->
            <div class="p-4 border-b border-gray-200">
                <select id="route-select" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Hatlar yükleniyor...</option>
                    <!-- Routes will be populated here -->
                </select>
            </div>
            
            <!-- Direction Selection -->
            <div class="p-4 border-b border-gray-200" id="direction-section" style="display: none;">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-700">Güzergahlar:</label>
                </div>
                
                <div class="space-y-2" id="direction-container">
                </div>
            </div>
            
            <!-- Stops List -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-4" id="stops-container" style="display: none;">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">Duraklar:</h3>
                <div class="space-y-1" id="stops-list">
                    <!-- Stops will be populated here -->
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-200 bg-gray-50">
                <p class="text-xs text-gray-500 text-center">© 2025 Metro İstanbul API Kullanılarak ❤️ ile Yapılmıştır</p>
            </div>
        </div>
        
        <!-- Right Panel (80%) - Map -->
        <div class="flex-1">
            <div id="map"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
